<!doctype html>
<html lang="pt-br", data-bs-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ficha Médica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<h1>Ficha Médica</h1>
<form action="/receber" method="POST">
  <h3>Paciente</h3><br>
  <label>Nome:</label>
  <input type="text" name="nome_paciente">
  <label>Convênio:</label>
  <input type="text" name="convenio">
  <label>Data de Nascimento:</label>
  <input type="date" name="data_nasc"><br><br>
  
  <label>Sexo:</label>
  <select name="sexo">
    <option value="Masculino">
        Masculino
    </option>
    <option value="Feminino">
        Feminino
    </option>
  </select>
  <label>Estado Civil:</label>
  <input type="text" name="est_civil" size="15">
  <label>RG:</label>
  <input type="text" name="RG"><br><br>

  <label>Endereço:</label>
  <input type="text" name="endereco" size="40">
  <label>Telefone:</label>
  <input type="text" name="telefone"><br><br>

  <h3>Consulta</h3><br>
  <label>Data:</label>
  <input type="date" name="data_consulta" size="15">
  <label>Médico:</label>
  <input type="text" name="medico">
  <label>Diagnóstico:</label>
  <input type="text" name="diagnostico"><br><br>

  <h3>Exame</h3><br>
  <label>Exame:</label>
  <input type="text" name="exame">
  <label>Data:</label>
  <input type="date" name="data_exame"><br><br>

  <button type="submit" value="Submit">Submeter</button>
</form>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
